name: Design Gates

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1'  # Weekly Monday UTC full run
  workflow_dispatch:

jobs:
  fast-gates:
    name: Design Gates (fast / inner-loop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system deps (for canvas native + build tools)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      # No Shen binary needed: the gates default to the in-process ShenScript
      # engine (cli/shen-check.js). The native kernel is built only in the
      # scheduled cross-check job below.

      - name: npm install
        run: npm install

      # The Pretext measurement cache (.witness/measurements.shen) is a COMMITTED
      # proof artifact — the oracle every fits? obligation is discharged against.
      # It is checked into the repo (see .gitignore), so a bare checkout already
      # has it and the gates need NO measurement step: cli/shen-check.js and
      # cli/theorem-run.js load it directly under (tc -). This step only asserts
      # its presence, so if it is ever re-ignored or dropped the failure is a
      # clear message here instead of an opaque ENOENT deep inside Gate 1.
      - name: Verify measurement cache is present (committed oracle)
        run: |
          test -f .witness/measurements.shen || {
            echo "::error::.witness/measurements.shen missing from checkout."
            echo "It is a committed proof artifact. Regenerate and commit it:"
            echo "  node cli/measure.js specs/ui/card-spec.shen"
            exit 1
          }
          echo "measurement cache present:"; cat .witness/measurements.shen

      # Was `--quick` (Gates 1+2 only) — i.e. the two gates that were vacuous:
      # Gate 1 type-checked comment-only stubs and Gate 2 was two echo calls.
      # Every push and PR was therefore gated on nothing. The full suite runs in
      # ~12s, so there is no reason to run less of it.
      - name: Run design gates (all five)
        run: npm run design-gates:full

      - name: Run test suite
        run: npm test

  full-gates:
    name: Design Gates (full)
    runs-on: ubuntu-latest
    # Scheduled/manual deep run. Note the gate suite itself now runs on every
    # push and PR above; this job additionally exercises the native Shen kernel
    # as an independent cross-check of the in-process ShenScript engine.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast-gates
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system deps (for canvas native + build tools)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install shen-sbcl (for Gate 1/2 tc+ via witness-check.sh)
        run: |
          sudo apt-get install -y sbcl git
          git clone --depth 1 https://github.com/Shen-Language/shen-sbcl.git /tmp/shen-sbcl
          cd /tmp/shen-sbcl
          ./fetch.sh
          ./build.sh
          sudo install -m 755 shen /usr/local/bin/shen
          sudo ln -sf /usr/local/bin/shen /usr/local/bin/shen-sbcl || true
          echo "SHEN_BIN=shen-sbcl" >> $GITHUB_ENV
          # Force the native path here. Without this the runner defaults to
          # WITNESS_SHEN_ENGINE=shenscript and this whole install is unused —
          # which was the case, so the cross-check never actually happened.
          echo "WITNESS_SHEN_ENGINE=native" >> $GITHUB_ENV
          shen --version

      - name: npm install
        run: npm install

      # Same committed-oracle assertion as the fast job: the native kernel path
      # (bin/witness-check.sh) also loads .witness/measurements.shen directly.
      - name: Verify measurement cache is present (committed oracle)
        run: |
          test -f .witness/measurements.shen || {
            echo "::error::.witness/measurements.shen missing from checkout."
            echo "It is a committed proof artifact. Regenerate and commit it:"
            echo "  node cli/measure.js specs/ui/card-spec.shen"
            exit 1
          }

      - name: Run full design gates on the native Shen kernel (cross-check)
        run: npm run design-gates:full
